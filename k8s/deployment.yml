apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydep
  namespace: argocd
spec:
  replicas: 10
  selector:
    matchLabels:
      app: latha
  template:
    metadata:
      labels:
        app: latha
    spec:
      containers:
        - name: mydepcom
          image: shaikmustafa/paytm:movie
          ports:
            - containerPort: 80

